{% extends "base.html" %}

{% block title %}Add Debt Record{% endblock %}

{% block content %}
<h1>Add Debt Record</h1>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label for="person_name">Person Name *</label>
            <input type="text" id="person_name" name="person_name" required placeholder="Who did you borrow from or lend to?">
        </div>

        <div class="form-group">
            <label for="type">Type *</label>
            <select id="type" name="type" required>
                <option value="">Select Type</option>
                <option value="borrowed">Borrowed (I owe them)</option>
                <option value="lent">Lent (They owe me)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Amount *</label>
            <input type="number" step="0.01" id="amount" name="amount" required placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Reason, payment terms, etc..."></textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">Add Debt Record</button>
            <a href="{{ url_for('assets.debt_list') }}" class="btn" style="background: #95a5a6;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
