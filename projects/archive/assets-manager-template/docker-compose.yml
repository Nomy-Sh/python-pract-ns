version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assets-manager-app
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:////app/data/assets.db
      - SECRET_KEY=change-this-in-production
      - UPLOAD_FOLDER=/app/images
      - MAX_CONTENT_LENGTH=5242880  # 5MB max file size
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: assets-manager-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 128m

volumes:
  data:
  images:
