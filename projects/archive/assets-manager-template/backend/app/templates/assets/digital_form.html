{% extends "base.html" %}

{% block title %}Add Digital Asset{% endblock %}

{% block content %}
<h1>Add New Digital Asset</h1>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label for="name">Asset Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g., God of War, Photoshop">
        </div>

        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
                <option value="">Select Category</option>
                <option value="game">Game</option>
                <option value="software">Software</option>
                <option value="tool">Tool</option>
                <option value="subscription">Subscription</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="platform">Platform</label>
            <input type="text" id="platform" name="platform" placeholder="e.g., PS5, Windows, Mac">
        </div>

        <div class="form-group">
            <label for="license_key">License Key</label>
            <input type="text" id="license_key" name="license_key" placeholder="Enter license key if applicable">
        </div>

        <div class="form-group">
            <label for="purchase_price">Purchase Price</label>
            <input type="number" step="0.01" id="purchase_price" name="purchase_price">
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Additional information..."></textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">Add Digital Asset</button>
            <a href="{{ url_for('assets.digital_list') }}" class="btn" style="background: #95a5a6;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
